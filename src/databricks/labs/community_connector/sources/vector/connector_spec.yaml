# Vector Community Connector Spec
# Connects to Vector's GraphQL API for pipeline observability.

display_name: Vector
connection:
  parameters:
    - name: api_url
      type: string
      required: true
      description: >
        URL of the Vector API endpoint (e.g. http://vector-host:8686).
        Vector must be running with api.enabled = true.
    - name: api_token
      type: string
      required: false
      description: >
        Optional bearer token for Vector API authentication.
        Only required if Vector is configured with api.auth.
    - name: events_url
      type: string
      required: false
      description: >
        URL of the Vector events buffer server (e.g. http://buffer-host:9009).
        Required for ingesting the ndr_events table. The buffer server receives
        events from Vector's HTTP sink and serves them via GET /events.

external_options_allowlist: ""
